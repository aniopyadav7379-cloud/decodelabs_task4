<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interns Directory · DecodeLabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">DL</span>
      <div class="brand-text">
        <h1>Interns Directory</h1>
        <p>DecodeLabs · Project 4 — Frontend &amp; Backend Integration</p>
      </div>
    </div>
    <div class="topbar-right">
      <div class="api-status" id="apiStatus" data-state="checking">
        <span class="status-dot"></span>
        <span class="status-label">Checking API…</span>
      </div>
      <button id="themeToggle" class="icon-btn theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
      <button id="loginBtn" class="btn btn-ghost btn-sm" type="button">Log in</button>
      <div id="userMenu" class="user-menu" hidden>
        <span id="usernameLabel" class="username-label"></span>
        <button id="logoutBtn" class="btn btn-ghost btn-sm" type="button">Log out</button>
      </div>
    </div>
  </header>

  <main class="page">

    <section class="toolbar">
      <div class="toolbar-left">
        <label for="searchInput" class="visually-hidden">Search interns</label>
        <input type="search" id="searchInput" placeholder="Search name, email, role…" />

        <label for="departmentFilter" class="visually-hidden">Filter by department</label>
        <select id="departmentFilter">
          <option value="">All departments</option>
          <option value="Engineering">Engineering</option>
          <option value="Design">Design</option>
          <option value="Product">Product</option>
          <option value="Marketing">Marketing</option>
          <option value="Operations">Operations</option>
        </select>

        <label for="sortField" class="visually-hidden">Sort by</label>
        <select id="sortField">
          <option value="joinedOn">Sort: Joined date</option>
          <option value="name">Sort: Name</option>
          <option value="department">Sort: Department</option>
          <option value="role">Sort: Role</option>
        </select>
        <button id="sortOrderBtn" class="btn btn-ghost btn-sm" type="button" title="Toggle ascending/descending">↓ Desc</button>

        <button id="refreshBtn" class="btn btn-ghost" type="button">Refresh</button>
      </div>
      <div class="toolbar-right">
        <div class="export-group">
          <a id="exportCsvBtn" class="btn btn-ghost btn-sm" href="#" download>Export CSV</a>
          <a id="exportJsonBtn" class="btn btn-ghost btn-sm" href="#" download>Export JSON</a>
        </div>
        <button id="addInternBtn" class="btn btn-primary" type="button" hidden>+ Add Intern</button>
      </div>
    </section>

    <section id="bulkToolbar" class="bulk-toolbar" hidden>
      <label class="bulk-select-all">
        <input type="checkbox" id="selectAllCheckbox" />
        <span id="selectedCountLabel">0 selected</span>
      </label>
      <button id="bulkDeleteBtn" class="btn btn-ghost btn-sm bulk-delete-btn" type="button">Delete selected</button>
    </section>

    <section id="errorBanner" class="error-banner" hidden>
      <span id="errorBannerText"></span>
      <button id="errorBannerRetry" class="btn btn-ghost btn-sm" type="button">Retry</button>
    </section>

    <section id="internGrid" class="intern-grid" aria-live="polite">
      <!-- Cards / skeletons / empty-state injected by js/ui.js -->
    </section>

    <nav id="pagination" class="pagination" aria-label="Pagination"></nav>

  </main>

  <!-- Slide-in drawer for Add / Edit -->
  <div id="drawerOverlay" class="drawer-overlay" hidden></div>
  <aside id="internDrawer" class="drawer" aria-hidden="true">
    <form id="internForm" novalidate>
      <div class="drawer-header">
        <h2 id="drawerTitle">Add Intern</h2>
        <button type="button" id="drawerClose" class="icon-btn" aria-label="Close">✕</button>
      </div>

      <input type="hidden" id="internId" />

      <label class="field">
        <span>Full name</span>
        <input type="text" id="internName" name="name" placeholder="e.g. Sam Chen" required />
        <small class="field-error" id="errName"></small>
      </label>

      <label class="field">
        <span>Email</span>
        <input type="email" id="internEmail" name="email" placeholder="sam.chen@decodelabs.tech" required />
        <small class="field-error" id="errEmail"></small>
      </label>

      <label class="field">
        <span>Role</span>
        <input type="text" id="internRole" name="role" placeholder="e.g. Frontend Intern" required />
        <small class="field-error" id="errRole"></small>
      </label>

      <label class="field">
        <span>Department</span>
        <select id="internDepartment" name="department" required>
          <option value="">Select a department</option>
          <option value="Engineering">Engineering</option>
          <option value="Design">Design</option>
          <option value="Product">Product</option>
          <option value="Marketing">Marketing</option>
          <option value="Operations">Operations</option>
        </select>
        <small class="field-error" id="errDepartment"></small>
      </label>

      <details class="advanced-fields">
        <summary>Additional profile details (optional)</summary>

        <label class="field">
          <span>Phone</span>
          <input type="text" id="internPhone" name="phone" placeholder="+1 415 555 0132" />
          <small class="field-error" id="errPhone"></small>
        </label>

        <label class="field">
          <span>Manager</span>
          <input type="text" id="internManager" name="manager" placeholder="e.g. Sam Okafor" />
          <small class="field-error" id="errManager"></small>
        </label>

        <label class="field">
          <span>LinkedIn</span>
          <input type="text" id="internLinkedin" name="linkedin" placeholder="https://linkedin.com/in/…" />
          <small class="field-error" id="errLinkedin"></small>
        </label>

        <label class="field">
          <span>Notes</span>
          <textarea id="internNotes" name="notes" rows="3" placeholder="What are they working on?"></textarea>
          <small class="field-error" id="errNotes"></small>
        </label>
      </details>

      <div class="drawer-actions">
        <button type="button" id="drawerCancel" class="btn btn-ghost">Cancel</button>
        <button type="submit" id="drawerSubmit" class="btn btn-primary">
          <span class="btn-label">Save intern</span>
          <span class="btn-spinner" hidden></span>
        </button>
      </div>
    </form>
  </aside>

  <!-- Read-only profile drawer -->
  <div id="profileOverlay" class="drawer-overlay" hidden></div>
  <aside id="profileDrawer" class="drawer" aria-hidden="true">
    <div class="drawer-header">
      <h2>Intern Profile</h2>
      <button type="button" id="profileClose" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div id="profileBody" class="profile-body"></div>
    <div class="drawer-actions" id="profileActions"></div>
  </aside>

  <!-- Login modal -->
  <div id="loginOverlay" class="drawer-overlay" hidden></div>
  <div id="loginModal" class="login-modal" hidden role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <form id="loginForm" novalidate>
      <div class="drawer-header">
        <h2 id="loginTitle">Log in</h2>
        <button type="button" id="loginClose" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <p class="login-hint">Log in to add, edit, or delete interns. Browsing stays open to everyone.</p>

      <label class="field">
        <span>Username</span>
        <input type="text" id="loginUsername" autocomplete="username" required />
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" id="loginPassword" autocomplete="current-password" required />
      </label>
      <small class="field-error" id="loginError"></small>

      <div class="drawer-actions">
        <button type="button" id="loginCancel" class="btn btn-ghost">Cancel</button>
        <button type="submit" id="loginSubmit" class="btn btn-primary">
          <span class="btn-label">Log in</span>
          <span class="btn-spinner" hidden></span>
        </button>
      </div>
    </form>
  </div>

  <!-- Signature element: a live network console mirroring real request/response traffic -->
  <div class="network-console" id="networkConsole">
    <div class="console-header">
      <span>Network Console</span>
      <button id="consoleToggle" class="icon-btn" aria-label="Collapse console">▾</button>
    </div>
    <div class="console-body" id="consoleBody"></div>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="assertive"></div>

  <script>window.__API_BASE_URL__ = "https://decodelabs-task4.onrender.com/api";</script>
   <script type="module" src="js/app.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
